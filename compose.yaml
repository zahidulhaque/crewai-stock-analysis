services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    network_mode: "host"  # Use host networking for direct localhost access
    environment:
      - API_KEY=${API_KEY}
      - MODEL_ID=${MODEL_ID}
      - MODEL_BASE_URL=${MODEL_BASE_URL}
      - OTEL_SDK_DISABLED=true
      - no_proxy=localhost,127.0.0.1,0.0.0.0
    # env_file:
    #   - .env